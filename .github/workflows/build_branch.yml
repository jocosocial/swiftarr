name: Build Branch
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  BuildAndDeployStack:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Swiftarr
        uses: actions/checkout@v2
      - name: Copy Template Config
        run: cp "Sources/swiftarr/seeds/Private Swiftarr Config/Docker-Template.env" "Sources/swiftarr/seeds/Private Swiftarr Config/production.env"
      - name: Hack Local Build Directory
        run: mkdir -p .build/checkouts
      - name: Build Production Stack
        run: scripts/stack.sh -e production build
      - name: Run Production Stack
        run: scripts/stack.sh -e production up -d
      - name: Wait For Healthy
        run: scripts/stack.sh -e production exec web bash -c "WAIT_HOSTS=\${SWIFTARR_IP}:\${SWIFTARR_PORT} /wait"
      - name: Dump Logs
        run: scripts/stack.sh -e production logs web
      - name: Test For Health
        run: .github/workflows/check_health.sh -e production

  Test:
    runs-on: ubuntu-24.04
    container:
      image: swift:6.2-noble
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: swiftarr
          POSTGRES_PASSWORD: password
          POSTGRES_DB: swiftarr-test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_HOSTNAME: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: swiftarr
      DATABASE_PASSWORD: password
      DATABASE_DB: swiftarr
      REDIS_HOSTNAME: redis
      REDIS_PORT: 6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install image system libraries
        run: apt-get update && apt-get install -y libgd-dev libvips-dev
      - name: Restore SwiftPM cache
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-
      - name: Run tests
        run: swift test --enable-test-discovery
