name: Build Branch
on: pull_request

jobs:
  build:
    # if: github.repository == 'jocosocial/swiftarr'
    runs-on: macos-15
    steps:
    - name: Get swift version
      run: swift --version # Swift 6.0
    # https://github.com/swift-actions/setup-swift/issues/683
    # - name: Install Swift
    #   uses: swift-actions/setup-swift@v2
    #   with:
    #     swift-version: "6.0"
    - name: Install GD Dependency
      run: brew install gd
    - name: Checkout Swiftarr
      uses: actions/checkout@v2
    - name: Setup Postgres
      run: .github/workflows/setup-runner-postgres.sh
    - name: Install Redis
      run: .github/workflows/setup-runner-redis.sh
    - name: Run Build
      run: swift build -c release
    # Deploy
    - name: Perform Database Migrations
      run: swift run swiftarr migrate --yes