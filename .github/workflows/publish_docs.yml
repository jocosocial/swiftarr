name: Generate Documentation
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
jobs:
  Build:
    runs-on: ubuntu-24.04
    container: docker.io/library/swift:6.2-noble
    steps:
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            libvips-dev pkg-config ruby-full build-essential git
      - name: Install Jazzy
        run: gem install jazzy --no-document
      - name: Install SourceKitten
        run: |
          git clone --depth 1 https://github.com/jpsim/SourceKitten.git /tmp/sourcekitten
          cd /tmp/sourcekitten && swift build -c release
          cp .build/release/sourcekitten /usr/local/bin/sourcekitten
      - name: Confirm Swift Version
        run: swift --version
      - name: Checkout Swiftarr
        uses: actions/checkout@v4
      - name: Generate Docs
        run: scripts/generatedocs.sh
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: docs/Output
  deploy:
    if: github.repository == 'jocosocial/swiftarr' && github.ref == 'refs/heads/master'
    needs: Build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
